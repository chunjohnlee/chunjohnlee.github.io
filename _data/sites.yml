- category: "Hobby Projects"
  link: "https://blackjlc.itch.io/finding-friendzy"
  icon: ghost
  title: "Finding Friendzy"
  colour: "#15212a" #TODO
  content: "Finding Friendzy is a Global Game Jam 2021 entry and had received Most Innovative Gameplay in Hong Kong jam site. The game is about finding your missing drunk friends in a club. I mainly contributed in the \"drunk effect\" as the player consumes more and more alcohol, player's control and movement, as well as the animations of all the characters"
  image: "/assets/images/finding_friendzy.png"
  caption: "Screenshot of Finding Friendzy"
- link: "https://github.com/daviddarnes/netlify-plugin-ghost-markdown"
  icon: netlify
  title: "Hole Again"
  colour: "#00C7B7" #TODO
  content: "Hole Again is a Global Game Jam 2020 entry in London Goldsmiths University jam site. The players are the road workers of two rivaling company. They need to fix as many potholes as possible while stopping the opponent to do so. Be aware that the cars won't stop just because you are fixing a pothole, so please try to stay alive. In this project, my main contribution is the traffic system which keep the cars to follow a procedural generated path in the city."
  image: "/assets/images/netlify-plugin-ghost-markdown-graphic.png"
  caption: "Example of markdown generation, image cloning and file caching with example resulting site"
