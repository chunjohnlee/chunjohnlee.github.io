- category: "Professional Projects"
  link: "https://www.neurotech.biz/see4myself"
  icon: s4mvr
  title: "See4Myself - VR" 
  colour: "#8549FC" # TODO
  content: "See4Myself was developed with Unity Engine and distributed on iPad and Oculus Quest and I was the programmer and the content designer of this product. The Quest version is a VR job simulator that enables students and adult with Autism Spectrum Disorder (ASD) to experience the workplace of different careers with a milder atmosphere."
  image: "/assets/images/S4MVR.jpg"
  caption: "Screenshot"
- link: "https://www.neurotech.biz/see4myself"
  icon: s4mipad
  title: "See4Myself - iPad"
  colour: "#00a975" # TODO
  content: "The iPad version is a top-down visual career explorer which displays many different careers in several mini-worlds, e.g. a hospital, a factory district, a construction site, a shopping center, etc. The characters which represent each career can be filtered with different criteria, like salary, qualification and more. Users can click on them to find more information about them. The information of the jobs is managed by SQLite. I also implemented some NPC that walks around in a node system so the world appears more lively."
  image: "/assets/images/S4MPad.jpg"
  caption: "Screenshot"
