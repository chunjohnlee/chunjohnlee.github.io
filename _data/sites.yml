- link: "https://github.com/TryGhost/eleventy-starter-ghost"
  icon: ghost
  title: "Eleventy Starter Ghost"
  colour: "#15212a"
  content: "The Eleventy Starter is designed to help developers build a site using the [Ghost Content API](https://ghost.org/changelog/jamstack/) with the popular Static Site Generator [Eleventy](https://www.11ty.dev/). The starter uses nunjucks to expose Ghost site data as well as rendering pages, posts, tags and author pages. Check out [my full write up on the official Ghost blog](https://ghost.org/changelog/eleventy/)."
  image: "/assets/images/eleventy-starter-ghost-graphic.png"
  caption: "Screenshot of the Eleventy Starter demo"
- link: "https://github.com/daviddarnes/netlify-plugin-ghost-markdown"
  icon: netlify
  title: "Netlify Build Plugin Ghost Markdown"
  colour: "#00C7B7"
  content: "With this plugin people can plug their Ghost install directly into any site hosted on Netlify. The plugin ustilises the [Ghost Content API](https://ghost.org/changelog/jamstack/) to convert content into the portable file format Markdown, which can be used my the majority of Static Site Generators. [Check out the demo](https://netlify-plugin-ghost-markdown-test.netlify.app/) to see it in action."
  image: "/assets/images/netlify-plugin-ghost-markdown-graphic.png"
  caption: "Example of markdown generation, image cloning and file caching with example resulting site"
